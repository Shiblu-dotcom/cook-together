name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # VITE_PROXY_URL is a repo *variable* (Settings → Secrets and variables →
      # Actions → Variables). Point it at the Vercel proxy, e.g.
      # https://cook-together.vercel.app/api/claude — the real AI switches on
      # at the next deploy. Unset, the app falls back to canned responses.
      - run: npm run build
        env:
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
